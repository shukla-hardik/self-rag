name: AutoDoc Update

on:
  issue_comment:
    types: [created]

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && github.event.comment.body == '/approve-autodoc' && github.event.sender.login != 'hardik-auto-doc-agent' && github.event.sender.login != 'hardik-auto-doc-agent[bot]'
    environment: autodoc-approval
    permissions:
      pull-requests: write
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Hard-Builds
          repositories: autodoc-agent

      - name: Checkout autodoc-agent
        uses: actions/checkout@v4
        with:
          repository: Hard-Builds/autodoc-agent
          path: autodoc-agent
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python via uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: autodoc-agent/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('autodoc-agent/uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        working-directory: autodoc-agent
        run: uv sync

      - name: Get PR branch
        id: pr-info
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH=$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Find analysis run ID
        id: find-run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "autodoc-analysis.yml" \
            --branch "${{ steps.pr-info.outputs.branch }}" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download checkpoint
        uses: actions/download-artifact@v4
        with:
          name: checkpoint-${{ github.event.issue.number }}
          path: autodoc-agent
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Run update
        working-directory: autodoc-agent
        run: |
          uv run python main.py \
            --owner "${{ github.event.repository.owner.login }}" \
            --repo "${{ github.event.repository.name }}" \
            --pr "${{ github.event.issue.number }}" \
            --mode update